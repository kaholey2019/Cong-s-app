services:
  - type: web
    name: conges-app
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: USER1_USERNAME
        value: admin
      - key: USER1_PASSWORD
        value: admin123
      - key: USER2_USERNAME
        value: user
      - key: USER2_PASSWORD
        value: user123
