<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — Registre des congés</title>
<meta name="theme-color" content="#15223E">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    background:#DCE6F4;color:#15223E;
    display:flex;align-items:center;justify-content:center;
    -webkit-font-smoothing:antialiased;
  }
  .card{
    background:#fff;border-radius:16px;padding:40px 36px 36px;
    box-shadow:0 1px 3px rgba(21,35,63,.06),0 20px 60px -20px rgba(21,35,63,.4);
    width:100%;max-width:400px;margin:20px;
  }
  .seal{
    width:52px;height:52px;border-radius:14px;margin:0 auto 18px;
    background:linear-gradient(150deg,#D9B95A,#BD9530);
    display:grid;place-items:center;
    font-family:'Georgia',serif;font-weight:700;font-size:22px;color:#16387A;
    box-shadow:0 1px 2px rgba(21,35,63,.08),inset 0 0 0 1px rgba(255,255,255,.4);
  }
  h1{text-align:center;font-size:19px;font-weight:600;letter-spacing:-.01em;margin-bottom:4px}
  .sub{text-align:center;font-size:12.5px;color:#566083;margin-bottom:28px;text-transform:uppercase;letter-spacing:.05em}
  label{display:block;font-size:13px;font-weight:500;margin-bottom:5px;color:#15223E}
  input{
    width:100%;padding:10px 14px;border:1.5px solid #CAD3E6;border-radius:10px;
    font-size:15px;font-family:inherit;background:#fff;color:#15223E;
    transition:border-color .15s,box-shadow .15s;outline:none;
  }
  input:focus{border-color:#1E4C9A;box-shadow:0 0 0 3px rgba(30,76,154,.15)}
  .field{margin-bottom:16px}
  .btn{
    width:100%;padding:12px;border:none;border-radius:10px;
    background:#1E4C9A;color:#fff;font-size:15px;font-weight:600;
    cursor:pointer;transition:background .14s;
    margin-top:6px;
  }
  .btn:hover{background:#16387A}
  .btn:disabled{opacity:.6;cursor:default}
  .error{
    background:#fdf0ef;color:#C9342E;font-size:13px;
    border-radius:9px;padding:10px 14px;margin-top:14px;display:none;
  }
  .info{text-align:center;font-size:12px;color:#8993AD;margin-top:20px}
</style>
</head>
<body>
<div class="card">
  <div class="seal">CG</div>
  <h1>Registre des congés</h1>
  <div class="sub">Gestion administrative</div>
  <form id="loginForm">
    <div class="field">
      <label for="username">Identifiant</label>
      <input type="text" id="username" name="username" autocomplete="username" required autofocus>
    </div>
    <div class="field">
      <label for="password">Mot de passe</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn" id="submitBtn">Se connecter</button>
    <div class="error" id="errorMsg"></div>
  </form>
  <div class="info">Accès réservé aux utilisateurs autorisés</div>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('errorMsg');
  btn.disabled = true; btn.textContent = 'Connexion…';
  err.style.display = 'none';
  try {
    const res = await fetch('/api/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value
      })
    });
    if (res.ok) {
      window.location.href = '/';
    } else {
      const data = await res.json();
      err.textContent = data.error || 'Identifiants incorrects';
      err.style.display = 'block';
    }
  } catch {
    err.textContent = 'Erreur de connexion au serveur';
    err.style.display = 'block';
  }
  btn.disabled = false; btn.textContent = 'Se connecter';
});
</script>
</body>
</html>
